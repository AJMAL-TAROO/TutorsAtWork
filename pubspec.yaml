name: taw_app
description: Cross-platform House of Tutors application for Windows, Android, and iOS.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  firebase_database: ^12.4.1
  firebase_storage: ^13.1.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  responsive_framework: ^1.5.1
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  intl: ^0.20.2
  syncfusion_flutter_pdfviewer: ^33.2.7
  http: ^1.6.0
  webview_flutter: ^4.13.1
  path_provider: ^2.1.5
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
